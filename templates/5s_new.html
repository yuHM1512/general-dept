<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đánh giá 5S mới</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary":"#002c50","primary-container":"#005A9C","on-primary":"#ffffff",
        "surface":"#F9F9FA","surface-container-lowest":"#FFFFFF",
        "surface-container-low":"#f3f3f8","surface-container":"#ededf2",
        "surface-container-high":"#EBEBEB","outline-variant":"#C1C7D2",
        "outline":"#727780","on-surface":"#1A1C1D","on-surface-variant":"#42474f",
        "secondary":"#1b6d24","background":"#f9f9fe",
      },
      spacing:{"xs":"0.25rem","sm":"0.5rem","md":"1rem","lg":"1.5rem","xl":"2rem","xxl":"3rem","margin":"2rem"},
      borderRadius:{DEFAULT:"0.125rem","lg":"0.25rem","xl":"0.5rem","full":"0.75rem"},
      fontFamily:{"body-md":["Inter"],"headline-md":["Manrope"],"label-md":["Inter"]},
      fontSize:{
        "body-md":    ["16px",{"lineHeight":"24px","fontWeight":"400"}],
        "headline-md":["28px",{"lineHeight":"36px","fontWeight":"600"}],
        "label-md":   ["12px",{"lineHeight":"16px","letterSpacing":"0.5px","fontWeight":"500"}],
      },
    },
  },
}
</script>
<style>
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
  .glass-card{background:rgba(255,255,255,.85);backdrop-filter:blur(12px)}
  select{appearance:none;-webkit-appearance:none}
  .tab-active  {background:#002c50;color:#fff}
  .tab-inactive{background:transparent;color:#42474f}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-thumb{background:#C1C7D2;border-radius:10px}
</style>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen">

<header class="w-full sticky top-0 z-40 bg-background/95 backdrop-blur-md px-4 md:px-margin py-md shadow-sm flex items-center gap-md">
  <a href="/internal-audit/5s" class="material-symbols-outlined text-primary p-2 hover:bg-surface-container-high rounded-full transition-colors active:scale-95 duration-150">arrow_back</a>
  <div>
    <p class="font-label-md text-label-md text-on-surface-variant">Kiểm tra 5S &amp; Trực quan</p>
    <h1 class="text-[20px] md:text-headline-md font-headline-md font-bold text-primary tracking-tight leading-tight">Đánh giá mới</h1>
  </div>
</header>

<main class="max-w-lg mx-auto px-4 md:px-margin py-xl pb-28">

  <div class="mb-xl">
    <p class="font-label-md text-label-md uppercase tracking-widest text-on-surface-variant mb-sm">Bắt đầu kiểm tra</p>
    <h2 class="text-[26px] md:text-[32px] font-headline-md font-bold text-primary leading-tight">Chọn khu vực &amp; loại kiểm tra</h2>
    <p class="text-on-surface-variant text-body-md mt-sm">Chọn đơn vị, bộ phận và loại tiêu chí để bắt đầu phiếu đánh giá 5S / Trực quan.</p>
  </div>

  <div class="glass-card rounded-xl shadow-lg p-lg md:p-xl space-y-lg border border-outline-variant/20">

    <div class="space-y-xs">
      <label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest" for="don_vi_select">Đơn vị</label>
      <div class="relative">
        <select id="don_vi_select" class="w-full bg-surface-container-low border border-outline-variant/30 rounded-xl px-md py-3 pr-10 text-on-surface font-body-md focus:outline-none focus:ring-2 focus:ring-primary/30 cursor-pointer">
          <option value="">Chọn đơn vị...</option>
          {% for dv in don_vi_list %}
          <option value="{{ dv.id }}">{{ dv.ma }}</option>
          {% endfor %}
        </select>
        <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none text-[20px]">expand_more</span>
      </div>
    </div>

    <div class="space-y-xs">
      <label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest" for="bo_phan_select">Bộ phận</label>
      <div class="relative">
        <select id="bo_phan_select" disabled class="w-full bg-surface-container-low border border-outline-variant/30 rounded-xl px-md py-3 pr-10 text-on-surface font-body-md focus:outline-none focus:ring-2 focus:ring-primary/30 cursor-pointer disabled:opacity-40 disabled:cursor-not-allowed transition-opacity">
          <option value="">Chọn bộ phận...</option>
        </select>
        <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none text-[20px]">expand_more</span>
      </div>
    </div>

    <div class="space-y-xs">
      <p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">Loại kiểm tra</p>
      <div class="flex bg-surface-container-low rounded-full p-1 border border-outline-variant/20 gap-1" role="group">
        <button type="button" data-loai="DAY_DU" onclick="selectLoai(this)" class="loai-tab flex-1 py-2 rounded-full font-label-md text-label-md text-[13px] transition-all tab-active">Đầy đủ</button>
        <button type="button" data-loai="5S" onclick="selectLoai(this)" class="loai-tab flex-1 py-2 rounded-full font-label-md text-label-md text-[13px] transition-all tab-inactive">5S</button>
        <button type="button" data-loai="TRUC_QUAN" onclick="selectLoai(this)" class="loai-tab flex-1 py-2 rounded-full font-label-md text-label-md text-[13px] transition-all tab-inactive">Trực quan</button>
      </div>
    </div>

    <button id="start-btn" disabled onclick="startAudit()" class="w-full flex items-center justify-center gap-sm bg-gradient-to-r from-primary to-primary-container text-on-primary px-lg py-4 rounded-full font-headline-md font-bold text-[16px] shadow-lg shadow-primary/20 active:scale-95 transition-all disabled:opacity-40 disabled:cursor-not-allowed disabled:active:scale-100">
      <span class="material-symbols-outlined">checklist</span>
      Bắt đầu kiểm tra
    </button>
  </div>

  <div class="mt-xl flex flex-wrap gap-sm">
    <span class="flex items-center gap-xs bg-surface-container-lowest border border-outline-variant/20 rounded-full px-md py-sm text-on-surface-variant font-label-md text-label-md">
      <span class="material-symbols-outlined text-[16px] text-secondary">star</span>
      Thang điểm 0 / 1 / 2 mỗi tiêu chí
    </span>
    <span class="flex items-center gap-xs bg-surface-container-lowest border border-outline-variant/20 rounded-full px-md py-sm text-on-surface-variant font-label-md text-label-md">
      <span class="material-symbols-outlined text-[16px] text-primary">schedule</span>
      Lưu kết quả sau khi hoàn tất
    </span>
  </div>
</main>

<script>
let selectedLoai = 'DAY_DU';

function selectLoai(btn) {
  document.querySelectorAll('.loai-tab').forEach(b => {
    b.classList.remove('tab-active'); b.classList.add('tab-inactive');
  });
  btn.classList.remove('tab-inactive'); btn.classList.add('tab-active');
  selectedLoai = btn.dataset.loai;
}

document.getElementById('don_vi_select').addEventListener('change', function() {
  const bpSel = document.getElementById('bo_phan_select');
  bpSel.innerHTML = '<option value="">Đang tải...</option>';
  bpSel.disabled = true;
  document.getElementById('start-btn').disabled = true;
  if (!this.value) { bpSel.innerHTML = '<option value="">Chọn bộ phận...</option>'; return; }
  fetch('/api/audit/bo-phan?don_vi_id=' + this.value)
    .then(r => r.json())
    .then(data => {
      bpSel.innerHTML = '<option value="">Chọn bộ phận...</option>';
      data.forEach(bp => {
        const o = document.createElement('option');
        o.value = bp.id; o.textContent = bp.ten; bpSel.appendChild(o);
      });
      bpSel.disabled = false;
    })
    .catch(() => { bpSel.innerHTML = '<option value="">Lỗi tải dữ liệu</option>'; });
});

document.getElementById('bo_phan_select').addEventListener('change', function() {
  document.getElementById('start-btn').disabled = !this.value;
});

function startAudit() {
  const bpId = document.getElementById('bo_phan_select').value;
  if (!bpId) return;
  window.location.href = '/internal-audit/5s/checklist?bo_phan_id=' + bpId + '&loai=' + selectedLoai;
}
</script>
</body>
</html>
