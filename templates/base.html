<!doctype html>
<html class="light" lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>{% block title %}{{ app_name }}{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-fixed-variant": "#00487f",
              primary: "#004275",
              error: "#ba1a1a",
              "primary-fixed": "#d2e4ff",
              "on-tertiary-container": "#82decd",
              "on-tertiary": "#ffffff",
              "on-tertiary-fixed": "#00201b",
              "surface-bright": "#f9f9fa",
              "inverse-primary": "#a1c9ff",
              "secondary-fixed-dim": "#88d982",
              "secondary-container": "#a0f399",
              "on-surface-variant": "#414750",
              "error-container": "#ffdad6",
              "primary-container": "#005a9c",
              "inverse-surface": "#2f3132",
              surface: "#f9f9fa",
              "tertiary-container": "#006357",
              "on-secondary-fixed": "#002204",
              "surface-container": "#edeeef",
              "on-background": "#1a1c1d",
              "on-tertiary-fixed-variant": "#005047",
              "primary-fixed-dim": "#a1c9ff",
              "surface-tint": "#1261a3",
              "tertiary-fixed": "#97f3e2",
              "on-error": "#ffffff",
              "surface-variant": "#e2e2e3",
              "surface-container-lowest": "#ffffff",
              "tertiary-fixed-dim": "#7ad7c6",
              "surface-container-highest": "#e2e2e3",
              secondary: "#1b6d24",
              "surface-container-high": "#e8e8e9",
              tertiary: "#004940",
              "on-secondary": "#ffffff",
              "surface-container-low": "#f3f3f4",
              "on-error-container": "#93000a",
              outline: "#727781",
              background: "#f9f9fa",
              "secondary-fixed": "#a3f69c",
              "surface-dim": "#d9dadb",
              "on-surface": "#1a1c1d",
              "on-primary-fixed": "#001c37",
              "on-primary-container": "#afd1ff",
              "on-secondary-container": "#217128",
              "on-secondary-fixed-variant": "#005312",
              "on-primary": "#ffffff",
              "outline-variant": "#c1c7d2",
              "inverse-on-surface": "#f0f1f1",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            fontFamily: {
              headline: ["Manrope"],
              body: ["Inter"],
              label: ["Inter"],
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      h1,
      h2,
      h3,
      .font-headline {
        font-family: "Manrope", sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
        vertical-align: middle;
      }
      .editorial-gradient {
        background: linear-gradient(135deg, #004275 0%, #005a9c 100%);
      }
    </style>

    {% block head_extra %}{% endblock %}
  </head>
  <body class="bg-surface text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed">
    <header class="docked full-width top-0 sticky z-50 bg-slate-50/80 backdrop-blur-xl shadow-sm">
      <div class="flex justify-between items-center px-8 h-16 w-full max-w-screen-2xl mx-auto">
        <div class="flex items-center gap-8">
          <a class="flex items-center" href="/" aria-label="{{ app_name }}">
            <span class="sr-only">{{ app_name }}</span>
            <span class="h-10 md:h-[44px] w-[150px] md:w-[170px] overflow-hidden">
              <img src="/static/Marex.jpg" alt="{{ app_name }}" class="h-full w-full object-cover object-center" />
            </span>
          </a>
          <nav class="hidden md:flex items-center gap-8 font-headline tracking-tight font-semibold">
            <a
              class="{% if active_nav == 'rcp' %}text-blue-900 border-b-2 border-blue-900 pb-1{% else %}text-slate-500 font-medium hover:text-blue-800 transition-colors{% endif %}"
              href="/rcp"
              >Trang chủ</a
            >
            <a
              class="{% if active_nav == 'rcp_data' %}text-blue-900 border-b-2 border-blue-900 pb-1{% else %}text-slate-500 font-medium hover:text-blue-800 transition-colors{% endif %}"
              href="/rcp/data"
              >Load Excel</a
            >
            <a
              class="{% if active_nav == 'rcp_dashboard' %}text-blue-900 border-b-2 border-blue-900 pb-1{% else %}text-slate-500 font-medium hover:text-blue-800 transition-colors{% endif %}"
              href="/rcp/dashboard"
              >Báo cáo</a
            >
          </nav>
        </div>
        <div class="flex items-center gap-3">
          <div class="hidden sm:block text-sm text-on-surface-variant">
            Mục tiêu: <span class="font-semibold text-on-surface">{{ target_salary_vnd_fmt }}</span> VND
          </div>
        </div>
      </div>
    </header>

    <main class="w-full max-w-screen-2xl mx-auto px-8 py-10">{% block content %}{% endblock %}</main>

    <footer class="full-width border-t border-slate-200 bg-slate-50 mt-16">
      <div class="flex flex-col md:flex-row justify-between items-center px-8 py-12 w-full max-w-screen-2xl mx-auto">
        <div class="text-sm text-slate-500">© {{ now_year }} RCP Salary Audit. All rights reserved.</div>
        <div class="flex gap-8 mt-6 md:mt-0">
          <a class="text-slate-500 hover:text-blue-600 hover:underline transition-all text-sm" href="/rcp/data">Data</a>
          <a class="text-slate-500 hover:text-blue-600 hover:underline transition-all text-sm" href="/rcp/dashboard">Dashboard</a>
          <a class="text-slate-500 hover:text-blue-600 hover:underline transition-all text-sm" href="/health">Health</a>
        </div>
      </div>
    </footer>

    {% block body_extra %}{% endblock %}
  </body>
</html>
